name: run

on:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo 'export PATH="$HOME/.bun/bin:$PATH"' >> $GITHUB_ENV

      - name: Install dependencies
        run: bun install

      - name: Install cloudflared
        run: |
          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          mv cloudflared-linux-amd64 cloudflared

      - name: Start Backend + Tunnel
        run: |
          bun run src/app.ts > server.log 2>&1 &
          sleep 5
          ./cloudflared tunnel --url http://localhost:3551 > tunnel.log 2>&1 &
          sleep 10
          echo "========== BACKEND LINK =========="
          grep -o 'https://[-a-z0-9]*\.trycloudflare.com' tunnel.log | head -n 1
          echo "=================================="

      - name: Keep Alive
        run: sleep 21600
